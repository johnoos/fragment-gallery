<nav id="navig-rail-container">
  <ul class="navig-rail-container__list">
    {% for menuItem in fetchNavigationTree %}
    <li class="navig-rail-container__item">
      {% set targetUrl = "/menuItemPage/" + menuItem.menuItemSlug + "/" %}
      {% set pushUrl = "/" + menuItem.menuItemSlug + "/" %}

      <button data-category="{{ menuItem.category | slugify }}" 
              title="{{ menuItem.category }}">
          {{ menuItem.category }}
      </button>
      
    </li>
    {% endfor %}
  </ul>
</nav>
