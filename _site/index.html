<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fragment Gallery</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- Local HTMX reference: stable and fast -->
    <script src="/assets/js/htmx.js"></script>
</head>
<body>
    <header id="top-panel-container" class="top-panel-style">
  <table class="top-panel-table-style">
    <tr>
      <td><img src="/assets/img/logo.png" alt="Logo" class="logo"></td> <!-- col 1 = logo -->
      <td style="width: 15px;"></td>                                <!-- col2 = spacer -->
      <td class="title-lines">
        <div class="title-line-1">John Oosthuizen&nbsp;&nbsp;|&nbsp;&nbsp;PhD Music</div>
        <div class="title-line-2">Academic Portfolio</div>
      </td>
      <td>
        <button class="menu-toggle" onclick="toggleMenu()">☰ Menu</button>
      </td>
    </tr>
  </table>
</header>

    <div class="middle-wrapper">
        <aside class="navigation-rail-container-style">
            <nav class="navigation-rail-container-style">
  <ul class="navigation-rail-container-style__list">
    
    <li class="navigation-rail-container-style__item">
      
      

      
      <button data-fragment="/menuItemPage/cv/" 
              data-push="/cv/"
              class="nav-trigger navigation-rail-container-style__link">
        CV
        <div class="loader spinner" style="display: none;"></div>
      </button>
      
    </li>
    
    <li class="navigation-rail-container-style__item">
      
      

      
      <button data-fragment="/menuItemPage/certificates/" 
              data-push="/certificates/"
              class="nav-trigger navigation-rail-container-style__link">
        Academic certificates
        <div class="loader spinner" style="display: none;"></div>
      </button>
      
    </li>
    
    <li class="navigation-rail-container-style__item">
      
      

      
      <button data-fragment="/menuItemPage/transcripts/" 
              data-push="/transcripts/"
              class="nav-trigger navigation-rail-container-style__link">
        Academic transcripts
        <div class="loader spinner" style="display: none;"></div>
      </button>
      
    </li>
    
    <li class="navigation-rail-container-style__item">
      
      

      
      <button data-fragment="/menuItemPage/theses/" 
              data-push="/theses/"
              class="nav-trigger navigation-rail-container-style__link">
        Theses
        <div class="loader spinner" style="display: none;"></div>
      </button>
      
    </li>
    
    <li class="navigation-rail-container-style__item">
      
      

      
      <button data-fragment="/menuItemPage/publications/" 
              data-push="/publications/"
              class="nav-trigger navigation-rail-container-style__link">
        Publications
        <div class="loader spinner" style="display: none;"></div>
      </button>
      
    </li>
    
    <li class="navigation-rail-container-style__item">
      
      

      
      <button data-fragment="/menuItemPage/reports/" 
              data-push="/reports/"
              class="nav-trigger navigation-rail-container-style__link">
        PhD-examiner-reports
        <div class="loader spinner" style="display: none;"></div>
      </button>
      
    </li>
    
  </ul>
</nav>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // 1. We no longer look for a single ID. 
    // We check if at least one navigation button exists to verify the partial loaded.
    const navExists = document.querySelector('.nav-trigger');
    
    if (navExists) {
      console.log('✅ Navigation buttons found. Initializing listener...');

      // 2. Prevent duplicate listeners if this partial is included multiple times
      if (!window.navListenerAttached) {
        document.addEventListener('click', async (e) => {
          
          // 3. Find the button (or its parent) with the trigger class
          const btn = e.target.closest('.nav-trigger');
          if (!btn) return;
      
          e.preventDefault();
          const targetContainer = document.querySelector('#content-panel-container');
          
          if (!targetContainer) {
            console.error("Target #content-panel-container not found on this page.");
            return;
          }
      
          try {
            console.log('Fetching content from:', btn.dataset.fragment);
            const res = await fetch(btn.dataset.fragment);
            
            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);

            // FIX: We must only call .text() ONCE. We save it to a variable.
            const htmlContent = await res.text();
            
            // Now we can log it and use it safely
            console.log('Successfully received HTML content');
            targetContainer.innerHTML = htmlContent;
            
            // Update browser URL
            history.pushState({}, '', btn.dataset.push);
            
          } catch (err) {
            console.error("Fetch error:", err);
          }
        });
    
        window.navListenerAttached = true;
      }
    } else {
      console.warn('No .nav-trigger buttons found in the DOM.');
    }
  });
</script>

        </aside>

        
        <main id="content-panel-container" class="content-panel-container-style">
            
        <table style="border-collapse: collapse; border: none;">
                <tr>
                        <!-- Spacer Column -->
                        <td style="width: 20px; padding: 0;"></td>
    
                        <!-- Content Column -->
                        <td style="padding: 0;">
                                <h1>Welcome</h1>
                                <p>Select a document category from the sidebar to begin.</p>
                        </td>
                </tr>
        </table>

        </main>
    </div>

    <footer class="footer">
  <div class="footer-style">
      <p style="text-align: center; margin-bottom: 0px;">© 2026 Dr. John Oosthuizen. All rights reserved.</p>
      <p style="text-align: center; margin-top: 2px;">March 2026</p>
  </div>
</footer>
</body>
</html>
